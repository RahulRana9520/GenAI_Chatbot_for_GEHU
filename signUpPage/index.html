<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="geu_medium.png" type="image/x-icon">
    <title>GEnius - log in or sign up</title>
    <style>
        body {
            background-color: #E6F4F7;
        }
    </style>
</head>
<body>
    <div class="container mt-44 flex mx-auto items-center justify-center">
        <div class="left w-1/3 mx-14">
            <img class="w-200" src="image.png" alt="Graphic Era University">
            <!-- <p class="text-3xl mx-8">Transform Dream In To Reality</p> -->
        </div>
        <div class="right flex flex-col bg-white p-8 rounded-lg w-1/4 text-lg relative">
            <h2 class="text-2xl font-bold text-center mb-4">GEnius Portal</h2>
            
            <div class="mb-4">
                <p class="text-xs font-bold text-purple-600 uppercase tracking-widest mb-2">👨‍🏫 Teacher</p>
                <div class="flex flex-col space-y-2">
                    <a href="teacher-login.html" class="bg-purple-600 hover:bg-purple-700 text-white py-3 px-4 rounded-md font-bold text-center">
                        Teacher Login
                    </a>
                    <a href="teacher-signup.html" class="bg-purple-100 hover:bg-purple-200 text-purple-800 py-3 px-4 rounded-md font-bold text-center">
                        Teacher Sign Up
                    </a>
                </div>
            </div>
            <hr class="my-4 border-gray-200">
            <div>
                <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">🎓 Student</p>
                <div class="flex flex-col space-y-2">
                    <a href="student-login.html" class="bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-md font-bold text-center">
                        Student Login
                    </a>
                    <a href="student-signup.html" class="bg-blue-100 hover:bg-blue-200 text-blue-800 py-3 px-4 rounded-md font-bold text-center">
                        Student Sign Up
                    </a>
                </div>
            </div>
            
            <p class="text-sm text-center text-gray-600">
                Access the GEnius platform for Graphic Era University's AI-powered learning experience
            </p>
        </div>
    </div>
</body>
</html>
