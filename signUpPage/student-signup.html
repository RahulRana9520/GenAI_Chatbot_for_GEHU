<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="geu_medium.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>GEnius - Student Sign Up</title>
    <style>
        body { background: linear-gradient(to right, #1a6fa8, #0d9488); }
        .form-input:focus { border-color: #1a6fa8; }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-lg shadow-xl overflow-hidden">
            <div class="px-6 py-8">
                <div class="flex justify-center mb-6">
                    <img src="geu_medium.png" alt="GEU Logo" class="h-20">
                </div>
                <h2 class="text-center text-3xl font-extrabold text-gray-900 mb-2">Student Sign Up</h2>
                <p class="text-center text-sm text-gray-500 mb-6">Create your GEnius student account</p>
                <div id="error-message" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 hidden"></div>
                <div id="success-message" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 hidden"></div>

                <form id="signup-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input id="fullName" type="text" required placeholder="Enter your full name"
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input id="email" type="email" required placeholder="student@geu.ac.in"
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Enrollment Number</label>
                        <input id="enrollmentId" type="text" required placeholder="e.g. 2021001234"
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Department</label>
                        <select id="department" required
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                            <option value="">Select Department</option>
                            <option>Computer Science</option>
                            <option>Information Technology</option>
                            <option>Electronics</option>
                            <option>Mechanical</option>
                            <option>Civil</option>
                            <option>Management</option>
                            <option>Humanities</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Password</label>
                        <input id="password" type="password" required placeholder="Min 6 characters"
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                        <input id="confirmPassword" type="password" required
                            class="mt-1 form-input block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Create Account
                    </button>
                </form>

                <p class="mt-4 text-center text-sm text-gray-600">
                    Already have an account?
                    <a href="student-login.html" class="font-medium text-blue-600 hover:text-blue-500">Log in</a>
                </p>
                <p class="mt-2 text-center text-sm text-gray-600">
                    <a href="index.html" class="text-gray-400 hover:text-gray-600">← Back to portal</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:3000";
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const err = document.getElementById('error-message');
            const suc = document.getElementById('success-message');
            const btn = document.getElementById('submit-btn');
            err.classList.add('hidden');
            suc.classList.add('hidden');

            const fullName    = document.getElementById('fullName').value.trim();
            const email       = document.getElementById('email').value.trim();
            const enrollmentId= document.getElementById('enrollmentId').value.trim();
            const department  = document.getElementById('department').value;
            const password    = document.getElementById('password').value;
            const confirm     = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                err.textContent = 'Passwords do not match.';
                err.classList.remove('hidden');
                return;
            }
            if (password.length < 6) {
                err.textContent = 'Password must be at least 6 characters.';
                err.classList.remove('hidden');
                return;
            }

            btn.textContent = 'Creating account...';
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/api/student/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name: fullName, email, enrollment_id: enrollmentId, department, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Signup failed');
                suc.textContent = 'Account created! Redirecting to login...';
                suc.classList.remove('hidden');
                setTimeout(() => window.location.href = 'student-login.html', 1500);
            } catch(ex) {
                err.textContent = ex.message;
                err.classList.remove('hidden');
            } finally {
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
